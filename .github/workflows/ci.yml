name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ios-sanity-runner:
    name: ios-sanity-runner (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ios-sanity-runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ios-sanity-runner/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build module (dist + d.ts)
        run: npm run build
